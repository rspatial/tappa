# Windows wheels + PyPI on tag push (tags prefixed with "py", separate from R/CRAN tags).
# Package root is this repository (not a python/ subfolder of terra).
# Requires terra C++ sources under terra_core/ (mirrored from rspatial/terra).

name: Python wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "py*"

jobs:
  build_wheels:
    name: Windows wheels
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-windows
          path: ./wheelhouse/*.whl

  upload_pypi:
    name: Upload wheels to PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/py')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cibw-wheels-*
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
