# Build the Sphinx docs site for tappa and deploy to GitHub Pages.
#
# - On push to main: rebuild and deploy to https://rspatial.github.io/tappa/
# - On pull request: build only, upload as artifact for review
#
# tappa is a compiled C++ extension that links against GDAL/GEOS/PROJ, and
# Sphinx's autodoc imports the package, so the workflow must build the
# extension before running sphinx-build. The Ubuntu runner has recent enough
# system libs (GDAL >= 3.4, GEOS >= 3.10, PROJ >= 8) for our needs.

name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment; cancel in-progress runs of the same.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build Sphinx HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (GDAL/GEOS/PROJ)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev \
            cmake pkg-config build-essential

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tappa with docs extras
        # -e so autodoc finds the source and pybind11 docstrings; the C++
        # extension still gets compiled into src/tappa/.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs,plot]"

      - name: Sanity check the import
        run: python -c "import tappa, tappa._terra; print('tappa', tappa.__file__)"

      - name: Build Sphinx site
        # -W: treat warnings as errors; --keep-going: still report all of them.
        run: |
          sphinx-build -W --keep-going -b html docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

      - name: Upload PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-html-pr${{ github.event.pull_request.number }}
          path: docs/_build/html
          retention-days: 14

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
